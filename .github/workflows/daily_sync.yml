name: daily-sync

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # Pull repository contents.
      - name: Checkout
        uses: actions/checkout@v4

      # Set Python runtime.
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Set Dart runtime.
      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      # Resolve Dart dependencies.
      - name: Get pipeline dependencies
        run: |
          cd pipeline
          dart pub get

      # Process one batch and refresh hashes.
      - name: Run sync + hashing
        run: python scripts/sync_hash.py

      # Build templates into versioned storage layout.
      - name: Run pipeline generation
        run: dart run pipeline/bin/generate_templates.dart

      # Commit only if files changed.
      - name: Commit updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add registry/hashes.json registry/batch.json registry/updates.json api_templates/current.json api_templates/global_index.json api_templates/apis
          git diff --cached --quiet || git commit -m "chore: daily sync hashes"
          git push
